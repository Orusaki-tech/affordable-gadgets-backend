# Ansible inventory - backend VM
# Replace EXTERNAL_IP with: terraform -chdir=deploy/terraform output -raw external_ip
# Or use: ansible-playbook -i "EXTERNAL_IP," playbook.yml (trailing comma = list of one host)

all:
  children:
    backend:
      hosts:
        backend-vm:
          ansible_host: EXTERNAL_IP   # set via -e ansible_host=1.2.3.4 or edit here
          ansible_user: ubuntu        # GCP Ubuntu default
          # ansible_ssh_private_key_file: ~/.ssh/your_gcp_key
