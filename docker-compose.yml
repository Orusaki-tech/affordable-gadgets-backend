# Backend (Django) + PostgreSQL. Use for local dev and as image source for GCP.
#
# Start:    docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f web
#
# Set .env with SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, Cloudinary, etc.
# DATABASE_URL is overridden for the web service to use host "postgres" (see below).

services:
  postgres:
    image: postgres:16-alpine
    container_name: affordable-gadgets-postgres
    environment:
      POSTGRES_USER: affordable
      POSTGRES_PASSWORD: affordable
      POSTGRES_DB: affordable_gadgets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affordable -d affordable_gadgets"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: affordable-gadgets-web
    env_file: .env
    environment:
      DATABASE_URL: postgresql://affordable:affordable@postgres:5432/affordable_gadgets
      PORT: "8000"
      DJANGO_SETTINGS_MODULE: store.settings_production
      DJANGO_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
